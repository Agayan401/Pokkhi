<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokkhi | The Birds of Assam</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f8f7f2;
            font-family:Georgia, serif;
            color:#2d3a2d;
            text-align:center;
            padding:2rem;
        }

        .container{
            max-width:700px;
        }

        .logo{
            font-size:4rem;
            margin-bottom:1rem;
        }

        h1{
            font-size:3rem;
            font-weight:normal;
            margin-bottom:0.5rem;
        }

        .subtitle{
            font-size:1.2rem;
            color:#666;
            margin-bottom:2rem;
            letter-spacing:1px;
        }

        .message{
            font-size:1.1rem;
            line-height:1.8;
            color:#444;
        }

        .footer{
            margin-top:3rem;
            font-size:0.95rem;
            color:#888;
        }

        @media(max-width:768px){
            h1{
                font-size:2.2rem;
            }

            .logo{
                font-size:3rem;
            }

            .subtitle{
                font-size:1rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="logo">🐦</div>

        <h1>Pokkhi</h1>

        <div class="subtitle">
            The Birds of Assam
        </div>

        <div class="message">
            We are building a comprehensive digital repository of the birds of Assam,
            featuring photographs, identification resources, and species information.
            <br><br>
            Our website will be launching soon.
        </div>

        <div class="footer">
            © Pokkhi | The Birds of Assam
        </div>

    </div>

</body>
</html>
